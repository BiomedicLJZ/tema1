<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QueryForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  /* ══════════════════════════════════════════════════
     TERMINAL NOIR — QueryForge Color System
     ══════════════════════════════════════════════════ */
  :root {
    --bg:       #030406;   /* void black                  */
    --surface:  #07090d;   /* dark surface                */
    --panel:    #0c0f15;   /* elevated panel              */
    --border:   #141c24;   /* subtle dividers             */
    --border2:  #1e2a38;   /* brighter borders            */
    --accent:   #39ffa0;   /* phosphor green — primary    */
    --accent2:  #ffaa44;   /* amber — secondary           */
    --accent3:  #6688dd;   /* steel blue — tertiary       */
    --text:     #b8ccc0;   /* cool off-white              */
    --muted:    #3a4e44;   /* muted green-dark            */
    --muted2:   #5a7060;   /* lighter muted               */
    --error:    #ff4466;   /* terminal red                */
    --success:  #39ffa0;   /* same as accent              */
    --mono:     'JetBrains Mono', 'Courier New', monospace;
    --sans:     'Syne', sans-serif;
    --radius:   4px;
    --glow:     0 0 12px rgba(57,255,160,.18);
    --glow-sm:  0 0 6px  rgba(57,255,160,.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── FIX: height:100vh (not min-height) so scroll chain works ── */
  html, body {
    height: 100vh;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    flex-direction: column;
  }

  /* ── Scanline + noise overlay ─────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      ),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: .55;
  }

  /* ── Scrollbars — terminal thin ───────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

  /* ══════════════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════════════ */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    height: 46px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }

  /* left accent line */
  header::before {
    content: '';
    position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    border-radius: 2px;
  }

  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: .08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .logo .cursor {
    display: inline-block;
    width: 8px; height: 13px;
    background: var(--accent);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 1.1s step-end infinite;
    opacity: .9;
  }

  @keyframes blink { 0%,100%{opacity:.9} 50%{opacity:0} }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }

  .status-badge {
    display: flex; align-items: center; gap: 7px;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--panel);
  }

  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%; background: var(--muted);
    transition: background .4s, box-shadow .4s;
    flex-shrink: 0;
  }
  #status-dot.ok  {
    background: var(--accent);
    box-shadow: var(--glow-sm);
  }
  #status-dot.err {
    background: var(--error);
    box-shadow: 0 0 6px rgba(255,68,102,.4);
  }

  #status-label {
    font-family: var(--mono); font-size: .68rem;
    color: var(--muted2); letter-spacing: .06em;
  }

  /* ══════════════════════════════════════════════════
     LAYOUT — fixed height enables scroll chain
     ══════════════════════════════════════════════════ */
  .workspace {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    overflow: hidden;   /* hard ceiling → children can scroll */
    min-height: 0;      /* flex shrink fix for Chrome */
  }

  /* ══════════════════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════════════════ */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;   /* children control their own scroll */
    min-height: 0;
  }

  /* ── Sidebar header ──────────────────────────────── */
  .sidebar-header {
    padding: 10px 14px;
    font-size: .6rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted2); font-family: var(--mono);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }

  .sidebar-header-left {
    display: flex; align-items: center; gap: 6px;
  }

  .sidebar-header-left::before {
    content: '▸';
    color: var(--accent); font-size: .65rem;
  }

  #refresh-btn {
    background: none; border: 1px solid transparent; cursor: pointer;
    color: var(--muted2); font-size: .8rem; padding: 2px 6px;
    border-radius: var(--radius);
    transition: color .2s, border-color .2s, background .2s;
    font-family: var(--mono);
  }
  #refresh-btn:hover {
    color: var(--accent);
    border-color: var(--border2);
    background: var(--panel);
  }

  /* ── THE scroll container — this is what scrolls ─── */
  #tables-list {
    overflow-y: auto;
    flex: 1;
    min-height: 0;    /* critical: allows flex child to shrink below content */
  }

  /* ── Schema group ────────────────────────────────── */
  .schema-group {
    border-bottom: 1px solid var(--border);
  }

  .schema-group-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px 6px;
    cursor: pointer;
    background: var(--bg);
    user-select: none;
    transition: background .15s;
    position: relative;
  }
  .schema-group-header:hover { background: var(--panel); }

  /* green left indicator bar */
  .schema-group-header::before {
    content: '';
    position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
    opacity: 0;
    transition: opacity .2s;
  }
  .schema-group-header:hover::before,
  .schema-group:not(.collapsed) .schema-group-header::before {
    opacity: 1;
  }

  .schema-toggle {
    font-size: .55rem; color: var(--muted2);
    transition: transform .2s; display: inline-block;
    flex-shrink: 0; width: 10px;
  }
  .schema-group.collapsed .schema-toggle { transform: rotate(-90deg); }

  .schema-group-name {
    font-family: var(--mono); font-size: .7rem;
    color: var(--accent); font-weight: 500;
    flex-shrink: 0;
    letter-spacing: .04em;
  }

  .schema-group-meta {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }

  .schema-group-file {
    font-family: var(--mono); font-size: .55rem;
    color: var(--muted); padding: 1px 5px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 110px;
    background: var(--panel);
  }

  .schema-group-count {
    font-family: var(--mono); font-size: .55rem;
    color: var(--muted2);
    flex-shrink: 0;
  }

  .schema-tables {
    overflow: hidden;
    transition: max-height .22s ease;
  }
  .schema-group.collapsed .schema-tables { max-height: 0 !important; }

  /* ── Table item ──────────────────────────────────── */
  .table-item {
    padding: 6px 12px 6px 22px;
    font-family: var(--mono); font-size: .72rem;
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: background .12s, color .12s;
    border-left: 2px solid transparent;
    position: relative;
  }

  .table-item:hover {
    background: var(--panel);
    color: var(--accent);
    border-left-color: var(--accent);
  }
  .table-item.active {
    background: var(--panel);
    color: var(--accent);
    border-left-color: var(--accent);
    box-shadow: inset 0 0 20px rgba(57,255,160,.03);
  }

  .table-item .t-icon {
    font-size: .65rem; color: var(--muted2); flex-shrink: 0;
  }
  .table-item.active .t-icon { color: var(--accent); }

  .table-item .t-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .table-item .ttype {
    font-size: .55rem; color: var(--muted);
    padding: 1px 4px;
    border: 1px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    transition: color .12s, border-color .12s;
  }
  .table-item:hover .ttype,
  .table-item.active .ttype {
    color: var(--accent); border-color: var(--accent);
    opacity: .7;
  }

  /* ── Schema info panel (bottom of sidebar) ───────── */
  .schema-info {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-family: var(--mono); font-size: .7rem;
    overflow-y: auto;
    max-height: 220px;
    min-height: 0;
  }

  .schema-info-header {
    padding: 7px 12px 5px;
    font-size: .58rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    background: var(--surface);
    position: sticky; top: 0; z-index: 1;
  }

  .schema-info-header .info-table-name {
    color: var(--accent2);
    font-size: .65rem;
    letter-spacing: .02em;
    text-transform: none;
    margin-left: 4px;
  }

  .col-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .col-row:last-child { border-bottom: none; }

  .col-row .col-name { color: var(--text); flex: 1; }
  .col-row .col-type { color: var(--accent3); flex-shrink: 0; font-size: .65rem; }
  .col-row .col-null { color: var(--muted2); font-size: .55rem; flex-shrink: 0; }

  /* ══════════════════════════════════════════════════
     MAIN AREA
     ══════════════════════════════════════════════════ */
  .main {
    display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }

  /* ── Loading bar ─────────────────────────────────── */
  #loading-bar {
    height: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent3), var(--accent2));
    width: 0; transition: width .3s; flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ── Editor pane ─────────────────────────────────── */
  .editor-pane {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .editor-label {
    font-size: .58rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted2); font-family: var(--mono);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }

  .editor-label span.prompt { color: var(--accent); }

  .editor-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border2), transparent);
  }

  #sql-editor {
    width: 100%; min-height: 110px; max-height: 240px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: .8rem;
    line-height: 1.7;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    caret-color: var(--accent);
  }

  #sql-editor::placeholder { color: var(--muted); }

  #sql-editor:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(57,255,160,.1), var(--glow);
  }

  .editor-actions {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
  }

  #run-btn {
    background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius);
    padding: 8px 20px; font-family: var(--mono);
    font-weight: 700; font-size: .78rem; letter-spacing: .08em;
    cursor: pointer;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    text-transform: uppercase;
    box-shadow: 0 0 14px rgba(57,255,160,.25);
  }
  #run-btn:hover  { opacity: .88; box-shadow: 0 0 20px rgba(57,255,160,.4); }
  #run-btn:active { transform: scale(.97); }
  #run-btn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

  #clear-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 8px 14px;
    color: var(--muted2); font-family: var(--mono); font-size: .75rem;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    letter-spacing: .04em;
  }
  #clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .shortcut-hint {
    font-family: var(--mono); font-size: .62rem;
    color: var(--muted); margin-left: auto;
    letter-spacing: .04em;
  }
  .shortcut-hint kbd {
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 3px; padding: 1px 5px; font-size: .6rem;
    color: var(--muted2);
  }

  /* ── Results pane ────────────────────────────────── */
  .results-pane {
    flex: 1; overflow: hidden; min-height: 0;
    display: flex; flex-direction: column;
  }

  .results-header {
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }

  .results-label {
    font-size: .58rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted2); font-family: var(--mono);
  }

  #result-meta {
    font-family: var(--mono); font-size: .68rem; color: var(--muted);
    margin-left: auto; display: flex; align-items: center; gap: 6px;
  }

  #result-meta .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 2px;
    font-size: .62rem; border: 1px solid transparent;
  }
  #result-meta .tag-rows  {
    background: #071a14; color: var(--success);
    border-color: #0f3028;
  }
  #result-meta .tag-time  {
    background: #08101a; color: var(--accent3);
    border-color: #101828;
  }
  #result-meta .tag-type  {
    background: #1a1005; color: var(--accent2);
    border-color: #2a200a;
  }

  .results-scroll { overflow: auto; flex: 1; min-height: 0; }

  /* ── Empty state ─────────────────────────────────── */
  #empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 12px; color: var(--muted);
    font-family: var(--mono); font-size: .78rem;
    letter-spacing: .04em;
  }

  #empty-state .glyph {
    font-size: 2rem; opacity: .2; color: var(--accent);
  }

  #empty-state .hint {
    font-size: .62rem; color: var(--muted);
  }

  /* ── Result table ────────────────────────────────── */
  #result-table {
    width: 100%; border-collapse: collapse;
    font-family: var(--mono); font-size: .76rem;
  }

  #result-table thead th {
    background: var(--surface);
    color: var(--accent);
    padding: 9px 14px; text-align: left;
    font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
    border-bottom: 1px solid var(--border2);
    position: sticky; top: 0; z-index: 2;
    white-space: nowrap;
    font-weight: 500;
  }

  #result-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  #result-table tbody tr:nth-child(even) { background: rgba(255,255,255,.01); }
  #result-table tbody tr:hover { background: var(--panel); }

  #result-table tbody td {
    padding: 7px 14px; color: var(--text);
    max-width: 280px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  #result-table tbody td.null-val { color: var(--muted); font-style: italic; }
  #result-table tbody td.num-val  { color: var(--accent3); }
  #result-table tbody td.bool-val { color: var(--accent2); }

  /* ── Messages ────────────────────────────────────── */
  .result-message {
    margin: 20px; padding: 14px 18px;
    border-radius: var(--radius); font-family: var(--mono); font-size: .78rem;
    line-height: 1.7; letter-spacing: .02em;
  }
  .result-message.success {
    background: #040f0b; border: 1px solid rgba(57,255,160,.3);
    color: var(--success);
  }
  .result-message.error {
    background: #0f0408; border: 1px solid rgba(255,68,102,.3);
    color: var(--error);
  }

  /* ── Animations ──────────────────────────────────── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: fadeSlideIn .2s ease forwards; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin .7s linear infinite; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════════════ -->
<header>
  <div class="logo">Query<span>Forge</span><span class="cursor"></span></div>
  <div class="header-right">
    <div class="status-badge">
      <span id="status-dot"></span>
      <span id="status-label">connecting…</span>
    </div>
  </div>
</header>

<div class="workspace">

  <!-- ══════════════════════════════════════════════
       SIDEBAR
       ══════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-header-left">Explorer</span>
      <button id="refresh-btn" title="Refresh">⟳</button>
    </div>

    <!-- THIS scrolls when content overflows -->
    <div id="tables-list"></div>

    <!-- Schema column panel at bottom -->
    <div id="schema-panel" class="schema-info" style="display:none"></div>
  </aside>

  <!-- ══════════════════════════════════════════════
       MAIN
       ══════════════════════════════════════════════ -->
  <div class="main">
    <div id="loading-bar"></div>

    <!-- Editor -->
    <div class="editor-pane">
      <div class="editor-label"><span class="prompt">$</span> SQL Query</div>
      <textarea id="sql-editor" spellcheck="false"
        placeholder="SELECT * FROM your_table LIMIT 50;"></textarea>
      <div class="editor-actions">
        <button id="run-btn">▶ RUN</button>
        <button id="clear-btn">Clear</button>
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span>
      </div>
    </div>

    <!-- Results -->
    <div class="results-pane">
      <div class="results-header">
        <span class="results-label">Output</span>
        <div id="result-meta"></div>
      </div>
      <div class="results-scroll" id="results-scroll">
        <div id="empty-state">
          <span class="glyph">⬡</span>
          <span>Run a query to see results</span>
          <span class="hint">Select a table from the sidebar or write SQL above</span>
        </div>
        <div id="result-output" style="display:none"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = (window.API_URL || 'http://localhost:8000');

  const editor      = document.getElementById('sql-editor');
  const runBtn      = document.getElementById('run-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const tablesList  = document.getElementById('tables-list');
  const schemaPanel = document.getElementById('schema-panel');
  const resultOut   = document.getElementById('result-output');
  const emptyState  = document.getElementById('empty-state');
  const resultMeta  = document.getElementById('result-meta');
  const loadingBar  = document.getElementById('loading-bar');
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');

  // activeTable: { name, schema } or null
  let activeTable = null;

  // ── Health check ─────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        statusDot.className = 'ok';
        statusLabel.textContent = 'connected';
      } else throw new Error();
    } catch {
      statusDot.className = 'err';
      statusLabel.textContent = 'offline';
    }
  }

  // ── Load all tables grouped by schema ─────────────────
  async function loadTables() {
    try {
      const [schemasRes, tablesRes] = await Promise.all([
        fetch(`${API}/schemas`),
        fetch(`${API}/tables`),
      ]);
      const schemasData = await schemasRes.json();
      const tablesData  = await tablesRes.json();

      tablesList.innerHTML = '';

      if (!tablesData.tables.length) {
        tablesList.innerHTML =
          '<div style="padding:16px;font-family:var(--mono);font-size:.7rem;color:var(--muted)">No tables found</div>';
        return;
      }

      // Group tables by schema
      const bySchema = {};
      tablesData.tables.forEach(t => {
        if (!bySchema[t.schema]) bySchema[t.schema] = [];
        bySchema[t.schema].push(t);
      });

      // Build source-file lookup from /schemas endpoint
      const sourceMap = {};
      (schemasData.schemas || []).forEach(s => { sourceMap[s.name] = s.source_file; });

      // Render one collapsible group per schema
      Object.keys(bySchema).sort().forEach(schemaName => {
        const tables     = bySchema[schemaName];
        const sourceFile = sourceMap[schemaName] || '';

        const group = document.createElement('div');
        group.className = 'schema-group';
        group.dataset.schema = schemaName;

        const header = document.createElement('div');
        header.className = 'schema-group-header';
        header.innerHTML =
          `<span class="schema-toggle">▼</span>` +
          `<span class="schema-group-name">${esc(schemaName)}</span>` +
          `<span class="schema-group-meta">` +
            (sourceFile
              ? `<span class="schema-group-file" title="${esc(sourceFile)}">${esc(sourceFile)}</span>`
              : '') +
            `<span class="schema-group-count">${tables.length}</span>` +
          `</span>`;
        header.addEventListener('click', () => toggleGroup(group));

        const tableContainer = document.createElement('div');
        tableContainer.className = 'schema-tables';

        tables.forEach(t => {
          const isActive = activeTable &&
            activeTable.name === t.name &&
            activeTable.schema === t.schema;

          const div = document.createElement('div');
          div.className = 'table-item' + (isActive ? ' active' : '');
          div.dataset.table  = t.name;
          div.dataset.schema = t.schema;
          div.innerHTML =
            `<span class="t-icon">${t.type === 'VIEW' ? '◈' : '▪'}</span>` +
            `<span class="t-name">${esc(t.name)}</span>` +
            `<span class="ttype">${t.type === 'VIEW' ? 'view' : 'tbl'}</span>`;

          div.addEventListener('click', () => {
            activeTable = { name: t.name, schema: t.schema };
            document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            loadSchema(t.name, t.schema);
            const qualifier = t.schema !== 'public' ? `"${t.schema}".` : '';
            editor.value = `SELECT * FROM ${qualifier}"${t.name}" LIMIT 50;`;
          });

          tableContainer.appendChild(div);
        });

        // Set initial max-height so CSS transitions work correctly
        group.appendChild(header);
        group.appendChild(tableContainer);
        tablesList.appendChild(group);

        requestAnimationFrame(() => {
          tableContainer.style.maxHeight = tableContainer.scrollHeight + 'px';
        });
      });

    } catch (e) { console.warn('loadTables', e); }
  }

  function toggleGroup(group) {
    const tables = group.querySelector('.schema-tables');
    if (group.classList.contains('collapsed')) {
      group.classList.remove('collapsed');
      tables.style.maxHeight = tables.scrollHeight + 'px';
    } else {
      tables.style.maxHeight = tables.scrollHeight + 'px';
      requestAnimationFrame(() => {
        group.classList.add('collapsed');
        tables.style.maxHeight = '0';
      });
    }
  }

  // ── Load column schema for selected table ─────────────
  async function loadSchema(name, schema) {
    schemaPanel.style.display = 'block';
    schemaPanel.innerHTML =
      `<div class="schema-info-header">` +
        `<span>Columns</span>` +
        `<span class="info-table-name">${esc(schema)}.${esc(name)}</span>` +
      `</div>` +
      `<div class="col-row"><span class="col-name" style="color:var(--muted)">loading…</span></div>`;
    try {
      const url = `${API}/tables/${encodeURIComponent(name)}/schema?schema=${encodeURIComponent(schema)}`;
      const r = await fetch(url);
      const data = await r.json();
      const colRows = data.columns.map(c =>
        `<div class="col-row">
          <span class="col-name">${esc(c.name)}</span>
          <span class="col-type">${esc(c.type)}</span>
          <span class="col-null">${c.nullable === 'YES' ? 'null' : 'nn'}</span>
        </div>`
      ).join('');
      schemaPanel.innerHTML =
        `<div class="schema-info-header">` +
          `<span>Columns</span>` +
          `<span class="info-table-name">${esc(schema)}.${esc(name)}</span>` +
        `</div>` + colRows;
    } catch {
      schemaPanel.innerHTML =
        `<div class="schema-info-header"><span>Columns</span></div>` +
        `<div class="col-row"><span style="color:var(--error);font-size:.7rem">Error loading schema</span></div>`;
    }
  }

  // ── Query execution ───────────────────────────────────
  async function runQuery() {
    const sql = editor.value.trim();
    if (!sql) return;

    runBtn.disabled = true;
    runBtn.textContent = '◌ Running';
    loadingBar.style.width = '60%';
    emptyState.style.display = 'none';
    resultOut.style.display = 'none';
    resultMeta.innerHTML = '';

    try {
      const r = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql })
      });

      loadingBar.style.width = '100%';
      setTimeout(() => { loadingBar.style.width = '0'; }, 400);

      const data = await r.json();

      if (!r.ok) {
        showError(data.detail || 'Unknown error');
      } else if (data.columns && data.columns.length > 0) {
        showTable(data);
      } else {
        showMessage(data.message || `${data.query_type} OK`, 'success');
      }

      resultMeta.innerHTML = `
        <span class="tag tag-type">${data.query_type || '?'}</span>
        <span class="tag tag-rows">${data.row_count} row${data.row_count !== 1 ? 's' : ''}</span>
        <span class="tag tag-time">${data.execution_time_ms ?? '?'} ms</span>
      `;

      const modifying = ['INSERT','UPDATE','DELETE','CREATE','DROP','ALTER','TRUNCATE'];
      if (modifying.includes((data.query_type || '').toUpperCase())) loadTables();

    } catch (e) {
      loadingBar.style.width = '0';
      showError('Network error — is the backend running?');
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = '▶ RUN';
    }
  }

  function showTable(data) {
    const { columns, rows } = data;
    let html = '<table id="result-table"><thead><tr>';
    columns.forEach(c => { html += `<th>${esc(c)}</th>`; });
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => {
        let cls = '';
        let display = cell;
        if (cell === null || cell === undefined) { display = 'null'; cls = 'null-val'; }
        else if (typeof cell === 'number') cls = 'num-val';
        else if (typeof cell === 'boolean') { display = String(cell); cls = 'bool-val'; }
        html += `<td class="${cls}" title="${esc(String(display))}">${esc(String(display))}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    resultOut.innerHTML = html;
    resultOut.className = 'anim-in';
    resultOut.style.display = '';
  }

  function showMessage(text, type) {
    resultOut.innerHTML = `<div class="result-message ${type}">${esc(text)}</div>`;
    resultOut.className = 'anim-in';
    resultOut.style.display = '';
  }

  function showError(msg) {
    resultOut.innerHTML = `<div class="result-message error">✗ ${esc(msg)}</div>`;
    resultOut.className = 'anim-in';
    resultOut.style.display = '';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Event listeners ───────────────────────────────────
  runBtn.addEventListener('click', runQuery);

  clearBtn.addEventListener('click', () => {
    editor.value = '';
    emptyState.style.display = '';
    resultOut.style.display = 'none';
    resultMeta.innerHTML = '';
    editor.focus();
  });

  editor.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQuery();
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(s);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });

  document.getElementById('refresh-btn').addEventListener('click', loadTables);

  // ── Init ──────────────────────────────────────────────
  checkHealth();
  loadTables();
  setInterval(checkHealth, 10000);
</script>
</body>
</html>
