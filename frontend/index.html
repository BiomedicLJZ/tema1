<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QueryForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #0f1318;
    --panel:    #141920;
    --border:   #1e2830;
    --accent:   #00e5c0;
    --accent2:  #ff6b35;
    --accent3:  #7b61ff;
    --text:     #c8d6e5;
    --muted:    #4a5a6a;
    --error:    #ff4d6d;
    --success:  #00c896;
    --mono:     'Syne Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Noise texture overlay ─────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.4;
  }

  /* ── Header ────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .logo span { color: var(--accent); }

  #status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--muted);
    margin-right: 8px; transition: background .4s;
  }
  #status-dot.ok  { background: var(--success); box-shadow: 0 0 8px var(--success); }
  #status-dot.err { background: var(--error);   box-shadow: 0 0 8px var(--error); }

  #status-label { font-family: var(--mono); font-size: .75rem; color: var(--muted); }

  /* ── Layout ────────────────────────────────────────── */
  .workspace {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ───────────────────────────────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); font-family: var(--mono);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  #refresh-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: .9rem; padding: 2px 4px;
    transition: color .2s;
  }
  #refresh-btn:hover { color: var(--accent); }

  #tables-list {
    overflow-y: auto; flex: 1; padding: 8px 0;
  }

  .table-item {
    padding: 8px 16px;
    font-family: var(--mono); font-size: .78rem;
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .15s, color .15s;
    border-left: 2px solid transparent;
  }

  .table-item:hover { background: var(--panel); color: var(--accent); border-left-color: var(--accent); }
  .table-item.active { background: var(--panel); color: var(--accent); border-left-color: var(--accent); }
  .table-item .ttype { font-size: .62rem; color: var(--muted); margin-left: auto; }

  .schema-info {
    padding: 10px 16px;
    background: var(--panel); border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: .72rem;
    overflow-y: auto; max-height: 200px;
  }

  .schema-info .col-row {
    display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .schema-info .col-row .col-type { color: var(--accent3); }

  /* ── Main area ─────────────────────────────────────── */
  .main {
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Editor pane ───────────────────────────────────── */
  .editor-pane {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .editor-label {
    font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); font-family: var(--mono);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }

  .editor-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  #sql-editor {
    width: 100%; min-height: 130px; max-height: 260px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
    caret-color: var(--accent);
  }

  #sql-editor:focus { border-color: var(--accent); }

  .editor-actions {
    display: flex; align-items: center; gap: 12px; margin-top: 12px;
  }

  #run-btn {
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 5px;
    padding: 9px 22px; font-family: var(--sans);
    font-weight: 700; font-size: .85rem; letter-spacing: .02em;
    cursor: pointer; transition: opacity .2s, transform .1s;
  }
  #run-btn:hover  { opacity: .85; }
  #run-btn:active { transform: scale(.97); }
  #run-btn:disabled { opacity: .4; cursor: not-allowed; }

  #clear-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 5px; padding: 9px 16px;
    color: var(--muted); font-family: var(--sans); font-size: .82rem;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  #clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .shortcut-hint {
    font-family: var(--mono); font-size: .68rem;
    color: var(--muted); margin-left: auto;
  }
  .shortcut-hint kbd {
    background: var(--border); border-radius: 3px;
    padding: 1px 5px; font-size: .65rem;
  }

  /* ── Results pane ──────────────────────────────────── */
  .results-pane {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .results-header {
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }

  .results-label {
    font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); font-family: var(--mono);
  }

  #result-meta {
    font-family: var(--mono); font-size: .72rem; color: var(--muted);
    margin-left: auto;
  }

  #result-meta .tag {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    margin-left: 8px; font-size: .65rem;
  }
  #result-meta .tag-rows  { background: #0e2a24; color: var(--success); }
  #result-meta .tag-time  { background: #1a1a2e; color: var(--accent3); }
  #result-meta .tag-type  { background: #1a120e; color: var(--accent2); }

  .results-scroll { overflow: auto; flex: 1; padding: 0; }

  /* placeholder */
  #empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 14px; color: var(--muted);
    font-family: var(--mono); font-size: .85rem;
  }

  #empty-state .glyph {
    font-size: 2.5rem; opacity: .3;
  }

  /* table */
  #result-table {
    width: 100%; border-collapse: collapse;
    font-family: var(--mono); font-size: .78rem;
  }

  #result-table thead th {
    background: var(--surface);
    color: var(--accent);
    padding: 10px 16px; text-align: left;
    font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 2;
    white-space: nowrap;
  }

  #result-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  #result-table tbody tr:hover { background: var(--panel); }

  #result-table tbody td {
    padding: 8px 16px; color: var(--text);
    max-width: 300px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  #result-table tbody td.null-val { color: var(--muted); font-style: italic; }
  #result-table tbody td.num-val  { color: var(--accent3); }
  #result-table tbody td.bool-val { color: var(--accent2); }

  /* message / error */
  .result-message {
    margin: 24px; padding: 16px 20px;
    border-radius: 6px; font-family: var(--mono); font-size: .82rem;
    line-height: 1.6;
  }
  .result-message.success { background: #0a1f1b; border: 1px solid var(--success); color: var(--success); }
  .result-message.error   { background: #1f0a0e; border: 1px solid var(--error);   color: var(--error); }

  /* loading */
  #loading-bar {
    height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent3));
    width: 0; transition: width .3s; flex-shrink: 0;
  }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* animations */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: fadeSlideIn .25s ease forwards; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin .7s linear infinite; }
</style>
</head>
<body>

<header>
  <div class="logo">Query<span>Forge</span></div>
  <div>
    <span id="status-dot"></span>
    <span id="status-label">connecting…</span>
  </div>
</header>

<div class="workspace">

  <!-- ── Sidebar ───────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      Tables
      <button id="refresh-btn" title="Refresh tables">↻</button>
    </div>
    <div id="tables-list"></div>
    <div id="schema-panel" class="schema-info" style="display:none"></div>
  </aside>

  <!-- ── Main ─────────────── -->
  <div class="main">
    <div id="loading-bar"></div>

    <!-- Editor -->
    <div class="editor-pane">
      <div class="editor-label">SQL Query</div>
      <textarea id="sql-editor" spellcheck="false"
        placeholder="SELECT * FROM your_table LIMIT 50;"></textarea>
      <div class="editor-actions">
        <button id="run-btn">▶ Run</button>
        <button id="clear-btn">Clear</button>
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span>
      </div>
    </div>

    <!-- Results -->
    <div class="results-pane">
      <div class="results-header">
        <span class="results-label">Results</span>
        <div id="result-meta"></div>
      </div>
      <div class="results-scroll" id="results-scroll">
        <div id="empty-state">
          <span class="glyph">⬡</span>
          <span>Run a query to see results</span>
        </div>
        <div id="result-output" style="display:none"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = (window.API_URL || 'http://localhost:8000');

  const editor      = document.getElementById('sql-editor');
  const runBtn      = document.getElementById('run-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const tablesList  = document.getElementById('tables-list');
  const schemaPanel = document.getElementById('schema-panel');
  const resultOut   = document.getElementById('result-output');
  const emptyState  = document.getElementById('empty-state');
  const resultMeta  = document.getElementById('result-meta');
  const loadingBar  = document.getElementById('loading-bar');
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');

  let activeTable = null;

  // ── Health check ─────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        statusDot.className = 'ok';
        statusLabel.textContent = 'connected';
      } else throw new Error();
    } catch {
      statusDot.className = 'err';
      statusLabel.textContent = 'disconnected';
    }
  }

  // ── Tables ───────────────────────────────────────────
  async function loadTables() {
    try {
      const r = await fetch(`${API}/tables`);
      const data = await r.json();
      tablesList.innerHTML = '';
      if (!data.tables.length) {
        tablesList.innerHTML = '<div style="padding:16px;font-family:var(--mono);font-size:.72rem;color:var(--muted)">No tables yet</div>';
        return;
      }
      data.tables.forEach(t => {
        const div = document.createElement('div');
        div.className = 'table-item' + (t.name === activeTable ? ' active' : '');
        div.innerHTML = `<span>⊞</span>${t.name}<span class="ttype">${t.type === 'VIEW' ? 'view' : 'tbl'}</span>`;
        div.addEventListener('click', () => {
          activeTable = t.name;
          document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
          div.classList.add('active');
          loadSchema(t.name);
          editor.value = `SELECT * FROM "${t.name}" LIMIT 50;`;
        });
        tablesList.appendChild(div);
      });
    } catch (e) { console.warn('loadTables', e); }
  }

  async function loadSchema(name) {
    schemaPanel.style.display = 'block';
    schemaPanel.innerHTML = '<div style="color:var(--muted);font-size:.7rem">loading…</div>';
    try {
      const r = await fetch(`${API}/tables/${encodeURIComponent(name)}/schema`);
      const data = await r.json();
      schemaPanel.innerHTML = data.columns.map(c =>
        `<div class="col-row">
          <span>${c.name}</span>
          <span class="col-type">${c.type}</span>
        </div>`
      ).join('');
    } catch { schemaPanel.innerHTML = '<div style="color:var(--error);font-size:.7rem">Error loading schema</div>'; }
  }

  // ── Query execution ──────────────────────────────────
  async function runQuery() {
    const sql = editor.value.trim();
    if (!sql) return;

    runBtn.disabled = true;
    runBtn.textContent = '◌ Running';
    loadingBar.style.width = '60%';
    emptyState.style.display = 'none';
    resultOut.style.display = 'none';
    resultMeta.innerHTML = '';

    try {
      const r = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql })
      });

      loadingBar.style.width = '100%';
      setTimeout(() => { loadingBar.style.width = '0'; }, 400);

      const data = await r.json();

      if (!r.ok) {
        showError(data.detail || 'Unknown error');
      } else if (data.columns && data.columns.length > 0) {
        showTable(data);
      } else {
        showMessage(data.message || `${data.query_type} OK`, 'success');
      }

      resultMeta.innerHTML = `
        <span class="tag tag-type">${data.query_type || '?'}</span>
        <span class="tag tag-rows">${data.row_count} row${data.row_count !== 1 ? 's' : ''}</span>
        <span class="tag tag-time">${data.execution_time_ms ?? '?'} ms</span>
      `;

      // Refresh sidebar after DDL / DML
      const modifying = ['INSERT','UPDATE','DELETE','CREATE','DROP','ALTER','TRUNCATE'];
      if (modifying.includes((data.query_type || '').toUpperCase())) loadTables();

    } catch (e) {
      loadingBar.style.width = '0';
      showError('Network error — is the backend running?');
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = '▶ Run';
    }
  }

  function showTable(data) {
    const { columns, rows } = data;
    let html = '<table id="result-table"><thead><tr>';
    columns.forEach(c => { html += `<th>${esc(c)}</th>`; });
    html += '</tr></thead><tbody>';

    rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => {
        let cls = '';
        let display = cell;
        if (cell === null || cell === undefined) { display = 'null'; cls = 'null-val'; }
        else if (typeof cell === 'number') cls = 'num-val';
        else if (typeof cell === 'boolean') { display = String(cell); cls = 'bool-val'; }
        html += `<td class="${cls}" title="${esc(String(display))}">${esc(String(display))}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';

    resultOut.innerHTML = html;
    resultOut.className = 'anim-in';
    resultOut.style.display = '';
  }

  function showMessage(text, type) {
    resultOut.innerHTML = `<div class="result-message ${type}">${esc(text)}</div>`;
    resultOut.className = 'anim-in';
    resultOut.style.display = '';
  }

  function showError(msg) {
    resultOut.innerHTML = `<div class="result-message error">✗ ${esc(msg)}</div>`;
    resultOut.className = 'anim-in';
    resultOut.style.display = '';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Event listeners ──────────────────────────────────
  runBtn.addEventListener('click', runQuery);

  clearBtn.addEventListener('click', () => {
    editor.value = '';
    emptyState.style.display = '';
    resultOut.style.display = 'none';
    resultMeta.innerHTML = '';
    editor.focus();
  });

  editor.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQuery();
    }
    // Tab key → insert spaces
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(s);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });

  document.getElementById('refresh-btn').addEventListener('click', loadTables);

  // ── Init ─────────────────────────────────────────────
  checkHealth();
  loadTables();
  setInterval(checkHealth, 10000);
</script>
</body>
</html>
